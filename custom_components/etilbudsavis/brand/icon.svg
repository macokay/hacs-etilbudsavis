<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="green-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="white-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#green-bg)" filter="url(#shadow)" />

  <g filter="url(#shadow)">
    <path d="M 120 180 Q 188 160 256 180 L 256 400 Q 188 380 120 400 Z" fill="url(#white-grad)" />
    <path d="M 256 180 Q 324 160 392 180 L 392 400 Q 324 380 256 400 Z" fill="url(#white-grad)" />
  </g>

  <g stroke="#CBD5E1" stroke-width="12" stroke-linecap="round">
    <line x1="150" y1="210" x2="230" y2="220" />
    <line x1="150" y1="250" x2="220" y2="260" />
    <line x1="150" y1="290" x2="230" y2="300" />
    <line x1="150" y1="330" x2="200" y2="340" />
    
    <line x1="282" y1="220" x2="362" y2="210" />
    <line x1="292" y1="260" x2="362" y2="250" />
    <line x1="282" y1="300" x2="362" y2="290" />
    <line x1="282" y1="340" x2="342" y2="330" />
  </g>

  <g filter="url(#shadow)" transform="translate(256, 170) rotate(-12)">
    <circle cx="0" cy="0" r="54" fill="#EF4444" stroke="#FFFFFF" stroke-width="6" />
    <text x="0" y="24" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF">%</text>
